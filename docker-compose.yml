services:
  db:
    image: postgis/postgis:16-3.4
    container_name: mining_os_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-miningos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-miningos}
      POSTGRES_DB: ${POSTGRES_DB:-miningos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miningos} -d ${POSTGRES_DB:-miningos}"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: mining_os_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.test}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
