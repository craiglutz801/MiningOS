name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install system deps for psycopg / geo libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev gdal-bin libgdal-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest -v --tb=short
